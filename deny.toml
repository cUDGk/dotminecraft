# cargo-deny configuration (SPEC §9.8). Run locally with: cargo deny check

[advisories]
version = 2
yanked = "deny"
# Each ignore needs a written justification and a removal trigger. These are transitive,
# unfixable-by-us advisories: the fix must come from upstream (libp2p) bumping its deps.
ignore = [
    # hickory-proto < 0.26.1: O(n^2) name compression -> CPU exhaustion when *encoding* a
    # DNS message with many compressible names. Pulled by libp2p-dns and libp2p-mdns, both
    # of which pin hickory ^0.25, so we cannot upgrade without libp2p. Low exposure: we
    # only encode our own bounded set of names (our multiaddrs / mDNS records); an attacker
    # cannot make us encode a pathological message. REMOVE once libp2p ships hickory >=0.26.
    "RUSTSEC-2026-0119",
    # hickory-proto NSEC3 closest-encloser proof can loop unbounded on crafted cross-zone
    # DNSSEC responses. No fixed release exists. libp2p-dns uses hickory-resolver WITHOUT
    # DNSSEC validation, so this NSEC3 path is not exercised in our usage. REMOVE if libp2p
    # enables DNSSEC validation or hickory ships a fix. Prefer /ip4 bootstrap to avoid DNS.
    "RUSTSEC-2026-0118",
    # paste 1.0.15: unmaintained (not a vulnerability). Build-time proc-macro pulled via
    # the Linux netlink stack (if-watch) under libp2p-tcp/quic/mdns. No runtime impact.
    # REMOVE once libp2p's transitive deps drop `paste`.
    "RUSTSEC-2024-0436",
]

[bans]
# libp2p's dependency tree legitimately carries a few duplicated versions; warn, don't fail.
multiple-versions = "warn"
wildcards = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses compatible with this crate's MIT OR Apache-2.0 distribution.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

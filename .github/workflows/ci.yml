name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all

  # The in-process multi-node libp2p E2E tests are #[ignore]d above so the gating `test` job
  # stays deterministic. We still run them here on their own runner: nothing else competes for
  # the CPU, so libp2p's stream timers don't starve. --test-threads=1 keeps the two heavy tests
  # from overlapping. continue-on-error keeps a rare runner-contention flake from blocking
  # merges while still surfacing the result in the checks list (the tests pass locally and the
  # real cross-machine tunnel is verified separately).
  e2e:
    name: e2e (in-process tunnel, best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run ignored E2E tests
        run: cargo test -p mc-tunnel --test tunnel_e2e -- --ignored --test-threads=1

  audit:
    name: cargo audit (known vulns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    name: cargo deny (licenses / bans / sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
